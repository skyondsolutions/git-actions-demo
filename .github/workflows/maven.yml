name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn clean install
    - name: Debug Username
      run: echo "User = ${{ secrets.DOCKER_USERNAME }}"

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/gitactionsdemo:latest
          ${{ secrets.DOCKER_USERNAME }}/gitactionsdemo:${{ github.sha }}

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t gitactionsdemo .

    - name: Tag Image
      run: |
        docker tag gitactionsdemo:latest \
        506511510920.dkr.ecr.us-east-1.amazonaws.com/spring-apps

    - name: Push Image
      run: |
        docker push \
        506511510920.dkr.ecr.us-east-1.amazonaws.com/spring-apps
    - name: Deploy to ECS
    uses: aws-actions/amazon-ecs-deploy-task-definition@v1
    with:
      task-definition: task-definition.json
      service: springboot-apps-service-o946yzhn
      cluster: cautious-horse-zcj55o
      wait-for-service-stability: true
